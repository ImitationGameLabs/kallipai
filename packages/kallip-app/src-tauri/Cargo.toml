[package]
name = "kallip-app"
version = "0.1.0"
description = "kallip mobile app"
authors = ["ImitationGameLabs"]
license = "MIT"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "kallip_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# This crate is intentionally a standalone workspace root, NOT a member of the
# repository's root Cargo workspace. Declaring an empty [workspace] table here
# stops Cargo's workspace auto-discovery from pulling this crate (and Tauri's
# heavy native GUI toolchain) into the backend workspace. Consequences:
#   - `cargo --workspace` at the repo root never builds the app.
#   - Backend release builds (crane) and the default devShell stay lean.
#   - Internal crates are still reachable via path deps (see [dependencies]).
#   - The app is verified in its own lane: `cargo fmt`/`clippy` from this dir.
[workspace]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.3", features = [] }
tauri-plugin-log = "2"
